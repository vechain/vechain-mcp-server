AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Platform stack for the MCP server: Route 53 public hosted zone (subdomain),
  ACM certificate, internet-facing ALB with HTTPS listener, WAF web ACL, IAM
  task roles, CloudWatch log group, security groups, and the SSM String
  parameters consumed by the service stack (infra/mcp-service.yaml). The
  shared VPC, subnets and ECS cluster are imported via SSM at deploy time.

Parameters:
  EnvironmentName:
    Type: String
    AllowedValues: [dev, prod]
    Description: Short environment identifier.

  ServiceName:
    Type: String
    Default: mcp-server
    Description: Base name for service/role/log group.

  DomainName:
    Type: String
    Description: Public FQDN to expose (e.g. mcp-dev.example.org).

  ContainerPort:
    Type: Number
    Default: 4000

  TaskCpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048', '4096']

  TaskMemory:
    Type: String
    Default: '1024'

  DesiredCount:
    Type: Number
    Default: 1

  ApiKeySsmName:
    Type: String
    Default: /mcp/server/api-key
    Description: >-
      SSM SecureString parameter name holding the bearer API key. Must be
      created out-of-band (CFN cannot create SecureString parameters).
      `aws ssm put-parameter --name <this> --type SecureString --value <key>`
      before deploying this stack.

  VpcId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /vpc/id

  VpcCidr:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /vpc/cidr

  PrivateSubnetIds:
    Type: AWS::SSM::Parameter::Value<List<String>>
    Default: /vpc/private-subnet-ids

  PublicSubnetIds:
    Type: AWS::SSM::Parameter::Value<List<String>>
    Default: /vpc/public-subnet-ids

  ClusterArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/cluster-arn

  RateLimitRequests:
    Type: Number
    Default: 2000
    Description: WAF rate-limit threshold (requests per 5-minute window per source IP).

Resources:
  # -------------------------------------------------------------------------
  # Route 53 + ACM
  # -------------------------------------------------------------------------
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone

  AliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID

  # -------------------------------------------------------------------------
  # IAM
  # -------------------------------------------------------------------------
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # MCP server is a stateless HTTP proxy with no AWS API calls at runtime.
      # No inline policies. If future tools need AWS access, attach here.

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadApiKeySsmSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:GetParameters
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ApiKeySsmName}'
              - Effect: Allow
                Action: kms:Decrypt
                # The AWS-managed SSM key is fine for SSM SecureString.
                Resource: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'

  # -------------------------------------------------------------------------
  # CloudWatch log group
  # -------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ServiceName}-${EnvironmentName}'
      RetentionInDays: 30

  # -------------------------------------------------------------------------
  # Security groups
  # -------------------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB SG for ${ServiceName}-${EnvironmentName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from the internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from the internet (redirected to HTTPS)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Default egress

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Service SG for ${ServiceName}-${EnvironmentName}'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Default egress

  ServiceIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: ALB to container
      GroupId: !Ref ServiceSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup

  # -------------------------------------------------------------------------
  # ALB + listeners + target group
  # -------------------------------------------------------------------------
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ServiceName}-${EnvironmentName}'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: 'false'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ServiceName}-${EnvironmentName}'
      VpcId: !Ref VpcId
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /ready
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'false'
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # -------------------------------------------------------------------------
  # WAFv2 web ACL (regional, associated to ALB)
  # -------------------------------------------------------------------------
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${ServiceName}-${EnvironmentName}'
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ServiceName}-${EnvironmentName}'
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesAmazonIpReputationList
            SampledRequestsEnabled: true
        - Name: RateLimitPerIp
          Priority: 10
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RateLimitRequests
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitPerIp
            SampledRequestsEnabled: true

  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref LoadBalancer
      WebACLArn: !GetAtt WebAcl.Arn

  # -------------------------------------------------------------------------
  # SSM String parameters consumed by the service stack
  # (the api-key SecureString is created out-of-band; see ApiKeySsmName)
  # -------------------------------------------------------------------------
  ParamCpu:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/cpu
      Type: String
      Value: !Ref TaskCpu

  ParamMemory:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/memory
      Type: String
      Value: !Ref TaskMemory

  ParamTaskRoleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/task-role-arn
      Type: String
      Value: !GetAtt TaskRole.Arn

  ParamExecutionRoleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/execution-role-arn
      Type: String
      Value: !GetAtt ExecutionRole.Arn

  ParamSubnetIds:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/subnet-ids
      Type: StringList
      Value: !Join [',', !Ref PrivateSubnetIds]

  ParamSecurityGroupIds:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/security-group-ids
      Type: StringList
      Value: !Ref ServiceSecurityGroup

  ParamTargetGroupArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/target-group-arn
      Type: String
      Value: !Ref TargetGroup

  ParamLogGroupName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/log-group-name
      Type: String
      Value: !Ref LogGroup

  ParamDesiredCount:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/desired-count
      Type: String
      Value: !Ref DesiredCount

  ParamClusterArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mcp/server/cluster-arn
      Type: String
      Value: !Ref ClusterArn

  # NOTE: /mcp/server/port is intentionally not managed here so that an
  # operator can change the listening port without re-applying the platform
  # stack. ContainerPort above is the source of truth at deploy time.

Outputs:
  HostedZoneId:
    Description: Hosted zone ID for the subdomain.
    Value: !Ref HostedZone

  HostedZoneNameServers:
    Description: >-
      NS records for the subdomain. Add these to the parent DNS zone (the one
      that owns the apex domain) so the subdomain delegation works and the
      ACM certificate can validate.
    Value: !Join [',', !GetAtt HostedZone.NameServers]

  AlbDnsName:
    Description: Direct DNS name of the ALB (useful for debugging; clients should use DomainName instead).
    Value: !GetAtt LoadBalancer.DNSName

  Fqdn:
    Description: Public FQDN the MCP server is reachable at.
    Value: !Sub 'https://${DomainName}'

  ApiKeySsmArn:
    Description: ARN of the SSM SecureString parameter the execution role is allowed to read.
    Value: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ApiKeySsmName}'
