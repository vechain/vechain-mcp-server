name: Publish Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME}" --no-git-tag-version --allow-same-version

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-output
          path: |
            dist/
            package.json
            package-lock.json
            README.md
            LICENSE

  publish-to-npmjs:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Setup Node.js for npmjs.org
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      - name: Publish to npmjs.org
        run: npm publish --access public --tag latest

  publish-to-github-packages:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Push the image to the dev environment's ECR first. Doing this before
  # the prod ECR push (and the dev deploy) ensures the image is available
  # by the time deploy-dev runs.
  publish-image-dev:
    uses: ./.github/workflows/publish-image.yml
    with:
      image_tag: ${{ github.ref_name }}
      set_latest: true
      environment: dev
    secrets: inherit

  # Push to the prod ECR in parallel with the dev rollout — the prod
  # rollout itself is gated by environment protection rules, so the prod
  # image will be ready well before the prod deploy is approved.
  publish-image-prod:
    needs: [publish-image-dev]
    uses: ./.github/workflows/publish-image.yml
    with:
      image_tag: ${{ github.ref_name }}
      set_latest: true
      environment: prod
    secrets: inherit

  # Roll out the just-published image to the dev environment. No approval
  # gate; the `dev` GitHub environment has no protection rules.
  deploy-dev:
    needs: [publish-image-dev]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.ref_name }}
      environment: dev
    secrets: inherit

  # Roll out to prod only after dev has succeeded AND a reviewer approves.
  # The approval gate is enforced by the `prod` GitHub environment's
  # protection rules (required_reviewers), not by the workflow.
  deploy-prod:
    needs: [deploy-dev, publish-image-prod]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.ref_name }}
      environment: prod
    secrets: inherit
