name: Publish Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME}" --no-git-tag-version --allow-same-version

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-output
          path: |
            dist/
            package.json
            package-lock.json
            README.md
            LICENSE

  publish-to-npmjs:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Setup Node.js for npmjs.org
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      - name: Publish to npmjs.org
        run: npm publish --access public --tag latest

  publish-to-github-packages:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the multi-arch image once and push it to the dev registries
  # (dev ECR + GHCR). Gated on `build` so a tag that fails npm version
  # (non-semver) does not produce a Docker release.
  publish-image-dev:
    needs: [build]
    uses: ./.github/workflows/publish-image.yml
    with:
      image_tag: ${{ github.ref_name }}
      set_latest: true
      environment: dev
    secrets: inherit

  # Promote the exact manifest published to GHCR by `publish-image-dev`
  # into the prod ECR. No rebuild: `docker buildx imagetools create`
  # copies by digest, so dev and prod always end up running the same
  # image content under the same tag. Only the immutable `:<tag>` is
  # written to prod ECR; `:latest` is not mutated on prod.
  copy-image-to-prod:
    needs: [publish-image-dev]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      ECR_REPOSITORY: mcp-server
      IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to prod ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Copy multi-arch manifest GHCR -> prod ECR
        run: |
          set -euo pipefail
          SRC="ghcr.io/${{ github.repository }}:${IMAGE_TAG}"
          DST="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker buildx imagetools create --tag "$DST" "$SRC"
          echo "Promoted $SRC -> $DST"

  # Roll out the just-published image to the dev environment. No approval
  # gate; the `dev` GitHub environment has no protection rules.
  deploy-dev:
    needs: [publish-image-dev]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.ref_name }}
      environment: dev
    secrets: inherit

  # Roll out to prod only after dev has succeeded, the prod image is
  # available, both package publications have completed successfully, AND a
  # reviewer approves. The approval gate is enforced by the `prod` GitHub
  # environment's protection rules (required_reviewers), not by the workflow.
  deploy-prod:
    needs: [deploy-dev, copy-image-to-prod, publish-to-npmjs, publish-to-github-packages]
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.ref_name }}
      environment: prod
    secrets: inherit
